backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: "assets/uploads"
public_folder: "/assets/uploads"
locale: "pt"

collections:
  - name: "blog"
    label: "Blog"
    files:
      - name: "posts"
        label: "Publicações"
        file: "content/blog/posts.json"
        format: "json"
        fields:
          - name: "posts"
            label: "Posts"
            label_singular: "Post"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { name: "title", label: "Título", widget: "string" }
              - { name: "category", label: "Categoria", widget: "string", default: "Reflexão" }
              - { name: "date", label: "Data", widget: "datetime", format: "DD MMM YYYY", date_format: "DD MMM YYYY", time_format: false }
              - { name: "excerpt", label: "Resumo curto", widget: "text" }
              - { name: "body", label: "Texto principal", widget: "text" }
              - { name: "videoUrl", label: "Link do vídeo", widget: "string", required: false, hint: "Cole aqui um link do YouTube, Instagram, Vimeo ou deixe em branco." }
              - { name: "videoLabel", label: "Texto do botão do vídeo", widget: "string", required: false, default: "Assistir vídeo" }
